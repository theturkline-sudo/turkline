<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turk Line Engineering | ترك لاين الهندسية</title>
    <!-- Redirect to Arabic as default -->
    <meta http-equiv="refresh" content="0; url=/ar/">
    
    <script>
        // Check for preferred language
        var userLang = navigator.language || navigator.userLanguage;
        if (userLang.startsWith('en')) {
            window.location.replace('/en/');
        } else {
            window.location.replace('/ar/');
        }
    </script>
</head>
<body>
    <p>Redirecting to Turk Line Engineering... <a href="/ar/">Click here</a></p>
</body>
